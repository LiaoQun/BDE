data:
  base_data_paths:
    - examples/test_data.csv.gz
  extra_data_paths: []
  cross_validation: none        # 'none' | 'leave_one_out' | int (K-Fold)
  dataset_dir: temp_dataset
  target_columns:
    - bde
  test_size: 0.1                # Reserved for future use
  val_size: 0.1                 # inner split ratio; 0.0 = Method-A (no early stopping)
  random_seed: 42
  featurizer_type: ChemPropFeaturizer

model:
  atom_features: 128
  num_messages: 6

train:
  epochs: 10
  lr: 0.001
  batch_size: 64
  model_save_path: bde_model.pt
  output_dir: training_runs
  early_stopping_patience: 10